[tools]
bun = "1.3.9"
node = "24"

[tasks.clone-repos]
description = "Clone all team repos into a destination directory"
usage = '''
flag "--destination <destination>" help="Destination directory for cloned repos"
'''
run = 'bun run src/index.ts clone-team-repos --destination=${usage_destination?} --use-sub-folders=true'

[tasks.prs]
description = "Show open pull requests across team repos"
usage = '''
flag "--skip-bots" help="Exclude pull requests opened by bots"
flag "--list-view" help="Show pull requests instead of only totals"
arg "[drafts]" help="Pass true to include draft pull requests"
'''
run = 'bun run src/index.ts prs ${usage_skip_bots:+--skip-bots} ${usage_list_view:+--list-view} ${usage_drafts:+$usage_drafts}'

[tasks.repos]
description = "Export non-archived team repos as JSON"
usage = '''
arg "<file>" help="Output file for the JSON repo list" default="repos.json"
'''
run = 'bun run src/index.ts repos --output=${usage_file}'

[tasks.repos-md]
description = "Export non-archived team repos as Markdown"
usage = '''
arg "<file>" help="Output file for the Markdown repo list" default="repos.md"
'''
run = 'bun run src/index.ts repos --output=${usage_file} --useMarkdown=true'

[tasks.copilot-sync]
description = "Sync Copilot config to repos"
usage = '''
flag "--repo <name>" help="Sync a single repo"
flag "--all" help="Sync all repos"
flag "--dry-run" help="Preview changes without writing files"
'''
run = 'bun run src/index.ts copilot sync ${usage_repo:+--repo $usage_repo} ${usage_all:+--all} ${usage_dry_run:+--dry-run}'

[tasks.copilot-setup]
description = "Set up local agents and MCP servers"
usage = '''
flag "--force" help="Overwrite existing files"
'''
run = 'bun run src/index.ts copilot setup ${usage_force:+--force}'

[tasks.copilot-status]
description = "Check Copilot sync status across repos"
usage = '''
flag "--repo <name>" help="Check a single repo"
'''
run = 'bun run src/index.ts copilot status ${usage_repo:+--repo $usage_repo}'

