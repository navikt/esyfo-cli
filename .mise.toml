[tools]
bun = "1.3.9"
node = "24"

[tasks.clone-repos]
description = "Clone all team repos into a destination folder"
usage = '''
flag "-d --destination <destination>" help="Pre-existing folder to clone all repositories in"
'''
run = 'bun run src/index.ts clone-team-repos --destination=${usage_destination?} --use-sub-folders=true'

[tasks.prs]
description = "Get prs for team"
usage = '''
flag "-b --skip-bots" help="Do not include pull requests opened by bots"
flag "-l --list-view" help="List pull requests instead of only showing totals"
arg "[drafts]" help="Pass true to include draft pull requests"
'''
run = 'bun run src/index.ts prs ${usage_skip_bots:+--skip-bots} ${usage_list_view:+--list-view} ${usage_drafts:+$usage_drafts}'

[tasks.repos]
description = "Export non-archived team repos as JSON"
usage = '''
arg "<file>" help="The file to output list of repositories as json to" default="repos.json"
'''
run = 'bun run src/index.ts repos --output=${usage_file}'

[tasks.repos-md]
description = "Export non-archived team repos as Markdown"
usage = '''
arg "<file>" help="The file to output the repoisitories to in markdown representation" default="repos.md"
'''
run = 'bun run src/index.ts repos --output=${usage_file} --useMarkdown=true'

[tasks.copilot-sync]
description = "Synkroniser copilot-konfig til repos"
usage = '''
flag "-r --repo <name>" help="Synk ett spesifikt repo"
flag "-a --all" help="Synk alle repos"
flag "-d --dry-run" help="Vis hva som ville endret seg"
'''
run = 'bun run src/index.ts copilot sync ${usage_repo:+--repo $usage_repo} ${usage_all:+--all} ${usage_dry_run:+--dry-run}'

[tasks.copilot-setup]
description = "Sett opp lokal maskin med agenter og MCP-servere"
usage = '''
flag "-f --force" help="Overskriv eksisterende filer"
'''
run = 'bun run src/index.ts copilot setup ${usage_force:+--force}'

[tasks.copilot-status]
description = "Sjekk sync-status på repos"
usage = '''
flag "-r --repo <name>" help="Sjekk ett spesifikt repo"
'''
run = 'bun run src/index.ts copilot status ${usage_repo:+--repo $usage_repo}'

