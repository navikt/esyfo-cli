# Mapping av repo-type → Copilot-konfigurasjonsfiler
# Brukes av `ecli copilot sync` for å distribuere riktige filer til hvert repo.
#
# Arkitektur (2-lags modell):
#   Lag 1: Agenter + repo-kontekst (dette — distribuert via `ecli copilot sync`)
#   Lag 2: MCP/plattform-verktøy (om tilgjengelig)

# Felles for ALLE repos
common:
  agents:
    - hovmester.agent.md
    - souschef.agent.md
    - kokk.agent.md
    - konditor.agent.md
    - mattilsynet.agent.md
    - inspektør-claude.agent.md
    - inspektør-gpt.agent.md
  instructions:
    - security.instructions.md
  skills:
    - observability-setup
    - issue-management
    - pull-request
    - auth-overview
    - conventional-commit
    - docker
    - github-actions
    - security-review
    - klarsprak
    - nais-manifest
  issue_templates:
    - feature.yml
    - bug.yml
    - story.yml
    - task.yml
    - epic.yml
    - config.yml
  pull_request_template: PULL_REQUEST_TEMPLATE.md

# Profiler per repo-type (additivt til common)
profiles:
  backend:
    copilot_instructions:
      - base.md
      - backend.md
    instructions:
      - kotlin.instructions.md
      - testing-kotlin.instructions.md
      - auth-kotlin.instructions.md
      # sql, kafka, and framework-specific kotlin instructions are resolved
      # dynamically by the assembler based on detected stack
    skills:
      - api-design
      # kafka-topic resolved dynamically when hasKafka
      # flyway-migration and postgresql-review resolved dynamically when hasDatabase

  frontend:
    copilot_instructions:
      - base.md
      - frontend.md
    instructions:
      - frontend.instructions.md
      - testing-typescript.instructions.md
      - auth-typescript.instructions.md
    skills:
      - lumi-survey
      - accessibility

  other:
    copilot_instructions:
      - base.md
