name: Build and publish library

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: ["main"]
env:
  NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[docs]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # https://github.com/oven-sh/setup-bun/releases/tag/v2.1.2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun run tsc
      - run: bun run lint
      - run: bun run build-cli
      - run: bun run sanity-check
      - uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@navikt"
      - name: Set publish version
        run: jq --arg version "1.0.$(date +%F-%H%M%S)" '.version = $version' package.json > updated.json && mv updated.json package.json
        working-directory: ./esyfo-cli
      - run: npm publish --tag latest
        if: github.ref == 'refs/heads/main'
        working-directory: ./esyfo-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
